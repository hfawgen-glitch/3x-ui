# Amnesia Mode Configuration
amnesia:
  enabled: false
  auto_reset_interval: 0
  enable_traffic: true
  auto_cleanup: true
  cleanup_interval: 300
  max_inbounds: 100
  max_clients_per_inbound: 1000
  enable_logging: true
  log_file: "/var/log/x-ui/amnesia.log"
  supported_protocols:
    - vless
    - vmess
    - trojan
    - shadowsocks
    - wireguard
    - awg2
    - hysteria
    - hysteria2
    - tuic
    - mixed
  default_protocol: "vless"
  warning_message: "Amnesia mode active: All configurations will be lost on panel restart"
  enable_backup: true
  backup_path: "/tmp/x-ui-amnesia-backup"
